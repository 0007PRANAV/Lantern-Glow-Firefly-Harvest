<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lantern Glow: Firefly Harvest</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #bfe3f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 90vh;
            max-height: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #334155;
            /* Using the requested image as the background */
            background-image: url('IMG_20260703_224812_264.jpg');
            background-size: cover;
            background-position: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* UI Overlay styles */
        .ui-element {
            position: absolute;
            z-index: 2;
            color: #1e293b;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        #score-board {
            top: 15px;
            left: 15px;
            font-size: 1.25rem;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        #fuel-container {
            top: 15px;
            right: 15px;
            width: 120px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #334155;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }
        #fuel-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #eab308, #facc15);
            transition: width 0.1s linear;
        }
        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #fef08a;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.4;
            color: #cbd5e1;
        }
        .btn {
            background: #eab308;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(234, 179, 8, 0.4);
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #facc15;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board" class="ui-element">Score: <span id="score">0</span></div>
        <div id="fuel-container" class="ui-element">
            <div id="fuel-bar"></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="screen-overlay">
            <h1 id="overlay-title">Lantern Glow</h1>
            <p id="overlay-desc">Fireflies are hiding in the tree! Click or tap the bright glowing fireflies to recharge the street lantern before its energy runs out. Avoid clicking the dark shadow moths!</p>
            <button id="action-btn" class="btn">Start Harvest</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const fuelBar = document.getElementById('fuel-bar');
        const screenOverlay = document.getElementById('screen-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const actionBtn = document.getElementById('action-btn');

        let score = 0;
        let fuel = 100;
        let gameActive = false;
        let bugs = [];
        let particles = [];
        let spawnTimer = 0;

        // Resize canvas to match its displayed bounding box
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Bug {
            constructor() {
                // Bug spawns primarily from around the tree area (middle-left)
                this.x = Math.random() * (canvas.width * 0.4);
                this.y = canvas.height * 0.3 + (Math.random() * (canvas.height * 0.3));
                this.radius = Math.random() * 6 + 8;
                
                // Target is near the lantern light (approx middle-right top area)
                const targetX = canvas.width * 0.6;
                const targetY = canvas.height * 0.35;
                
                const angle = Math.atan2(targetY - this.y, targetX - this.x);
                const speed = Math.random() * 1.5 + 1;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // 75% chance for a good firefly, 25% for a bad shadow moth
                this.type = Math.random() > 0.25 ? 'firefly' : 'moth';
                this.pulse = Math.random() * Math.PI;
            }

            update() {
                // Add a slight natural wavy motion
                this.pulse += 0.05;
                this.x += this.vx + Math.sin(this.pulse) * 0.3;
                this.y += this.vy + Math.cos(this.pulse) * 0.3;
            }

            draw() {
                ctx.beginPath();
                if (this.type === 'firefly') {
                    // Glow effect
                    const glowRadius = this.radius * (1.5 + Math.sin(this.pulse) * 0.3);
                    let grad = ctx.createRadialGradient(this.x, this.y, 2, this.x, this.y, glowRadius);
                    grad.addColorStop(0, '#fffdf0');
                    grad.addColorStop(0.4, '#fef08a');
                    grad.addColorStop(1, 'rgba(254, 240, 138, 0)');
                    ctx.fillStyle = grad;
                    ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // Core body
                    ctx.beginPath();
                    ctx.fillStyle = '#eab308';
                    ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Shadow Moth
                    ctx.fillStyle = 'rgba(30, 41, 59, 0.8)';
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                    // Small warning core
                    ctx.beginPath();
                    ctx.fillStyle = '#ef4444';
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.alpha = 1;
                this.radius = Math.random() * 3 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.03;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleInteraction(clientX, clientY) {
            if (!gameActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = clientX - rect.left;
            const clickY = clientY - rect.top;

            for (let i = bugs.length - 1; i >= 0; i--) {
                const bug = bugs[i];
                const dist = Math.hypot(clickX - bug.x, clickY - bug.y);
                
                // Forgiving tap radius
                if (dist < bug.radius + 20) {
                    if (bug.type === 'firefly') {
                        score += 10;
                        fuel = Math.min(100, fuel + 12);
                        scoreEl.textContent = score;
                        createBurst(bug.x, bug.y, '#facc15');
                    } else {
                        // hit a moth
                        fuel = Math.max(0, fuel - 20);
                        createBurst(bug.x, bug.y, '#ef4444');
                    }
                    bugs.splice(i, 1);
                    return; // Hit one per click/tap max
                }
            }
        }

        // Pointer event listeners
        canvas.addEventListener('mousedown', (e) => handleInteraction(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function startGame() {
            score = 0;
            fuel = 100;
            bugs = [];
            particles = [];
            scoreEl.textContent = score;
            gameActive = true;
            screenOverlay.style.display = 'none';
            animate();
        }

        function gameOver() {
            gameActive = false;
            screenOverlay.style.display = 'flex';
            overlayTitle.textContent = "The Lantern Faded";
            overlayDesc.textContent = `You harvested beautifully and kept the street lit! Total Score: ${score} points.`;
            actionBtn.textContent = "Harvest Again";
        }

        function animate() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Deplete fuel over time
            fuel -= 0.12;
            if (fuel <= 0) {
                fuel = 0;
                gameOver();
            }
            fuelBar.style.width = fuel + '%';

            // Spawn bugs
            spawnTimer++;
            if (spawnTimer > 40) {
                bugs.push(new Bug());
                spawnTimer = 0;
            }

            // Update & Draw Bugs
            for (let i = bugs.length - 1; i >= 0; i--) {
                const bug = bugs[i];
                bug.update();
                bug.draw();

                // If bug safely reaches near the lantern area (middle-right top)
                if (bug.x > canvas.width * 0.55 && bug.y < canvas.height * 0.45) {
                    if (bug.type === 'firefly') {
                        // Firefly enters the lamp naturally - nice!
                        fuel = Math.min(100, fuel + 4);
                    }
                    bugs.splice(i, 1);
                }
                // Out of bounds safety check
                else if (bug.x > canvas.width + 20 || bug.y < -20 || bug.y > canvas.height + 20) {
                    bugs.splice(i, 1);
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        actionBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
